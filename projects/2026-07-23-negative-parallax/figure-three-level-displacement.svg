<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 660" font-family="Georgia, 'Times New Roman', serif" fill="#111">
  <rect x="0" y="0" width="960" height="660" fill="#fbfbf9"/>

  <!-- Title -->
  <text x="40" y="46" font-size="21" font-weight="bold">The one ruler: error measured in units of its own claimed precision</text>
  <text x="40" y="70" font-size="13" fill="#444">Negative parallax on the parallax_over_error axis (&#966;/&#963;&#966;). Not three populations — one axis, read three ways.</text>

  <!-- ================= THE AXIS ================= -->
  <!-- axis line -->
  <line x1="120" y1="300" x2="880" y2="300" stroke="#111" stroke-width="2"/>
  <!-- arrowheads -->
  <polygon points="880,300 868,294 868,306" fill="#111"/>
  <polygon points="120,300 132,294 132,306" fill="#111"/>
  <text x="892" y="304" font-size="12" fill="#444">&#966;/&#963;&#966;</text>

  <!-- tick geometry: -10 at x=140, +10 at x=860, so 36 px per unit; 0 at x=500 -->
  <!-- zero tick (nominal) -->
  <line x1="500" y1="290" x2="500" y2="310" stroke="#111" stroke-width="1.5"/>
  <text x="500" y="330" font-size="12" text-anchor="middle">0</text>
  <!-- -5 threshold -->
  <line x1="320" y1="270" x2="320" y2="330" stroke="#b03030" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="320" y="348" font-size="12" text-anchor="middle" fill="#b03030">&#8722;5</text>
  <!-- +5 mirror -->
  <line x1="680" y1="270" x2="680" y2="330" stroke="#2b6cb0" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="680" y="348" font-size="12" text-anchor="middle" fill="#2b6cb0">+5</text>
  <!-- -10 / +10 endpoints -->
  <text x="140" y="330" font-size="11" text-anchor="middle" fill="#666">&#8722;10</text>
  <text x="860" y="330" font-size="11" text-anchor="middle" fill="#666">+10</text>

  <!-- ===== LEVEL 1 — VALUE (near zero) ===== -->
  <rect x="404" y="284" width="192" height="32" fill="#2f8f4e" opacity="0.14"/>
  <text x="500" y="252" font-size="13" font-weight="bold" text-anchor="middle" fill="#2f6f3e">LEVEL 1 · VALUE — dissolved</text>
  <text x="500" y="200" font-size="11.5" text-anchor="middle" fill="#333">|&#966;| &#8818; &#963;&#966;: a noise-negative.</text>
  <text x="500" y="216" font-size="11.5" text-anchor="middle" fill="#333">&#8220;does not correspond to a negative distance,</text>
  <text x="500" y="232" font-size="11.5" text-anchor="middle" fill="#333">because r &gt; 0 by definition&#8221; (Bailer-Jones 2015)</text>

  <!-- ===== LEVEL 2 — SOLUTION (deep negative tail) ===== -->
  <rect x="140" y="284" width="180" height="32" fill="#b03030" opacity="0.13"/>
  <text x="230" y="392" font-size="13" font-weight="bold" text-anchor="middle" fill="#8f2020">LEVEL 2 · SOLUTION — re-erected</text>
  <text x="230" y="412" font-size="11.5" text-anchor="middle" fill="#333">&#966;/&#963;&#966; &lt; &#8722;5: 3.04M sources,</text>
  <text x="230" y="428" font-size="11.5" text-anchor="middle" fill="#333">&#8220;clearly spurious&#8221; (Fabricius 2021).</text>
  <text x="230" y="444" font-size="11.5" text-anchor="middle" fill="#333">Excised &#8594; ground-truth of the fidelity</text>
  <text x="230" y="460" font-size="11.5" text-anchor="middle" fill="#333">classifier (Rybizki 2021).</text>

  <!-- ===== RE-FUNCTIONALISATION 1 — INFORMATION (value -> posterior) ===== -->
  <path d="M500,196 C 540,150 560,132 588,120" fill="none" stroke="#2f6f3e" stroke-width="1.4"/>
  <polygon points="588,120 585,132 596,127" fill="#2f6f3e"/>
  <text x="600" y="112" font-size="11" fill="#2f6f3e">re-functionalised as INFORMATION</text>
  <text x="600" y="127" font-size="10.5" fill="#555">posterior: &#8220;far away, with this error bar&#8221;</text>

  <!-- ===== RE-FUNCTIONALISATION 2 — INSTRUMENT (Fabricius symmetry -5 <-> +5) ===== -->
  <path d="M320,388 C 460,470 560,470 680,388" fill="none" stroke="#2b6cb0" stroke-width="1.4" stroke-dasharray="1 0"/>
  <polygon points="680,388 671,381 674,393" fill="#2b6cb0"/>
  <text x="500" y="492" font-size="11" text-anchor="middle" fill="#2b6cb0">re-functionalised as INSTRUMENT</text>
  <text x="500" y="508" font-size="10.5" text-anchor="middle" fill="#555">matched negative sample (&#966;/&#963;&#966; &lt; &#8722;5) estimates the spurious</text>
  <text x="500" y="523" font-size="10.5" text-anchor="middle" fill="#555">fraction hiding among positives (&#966;/&#963;&#966; &gt; +5): &#8776;1.6% (Fabricius 2021)</text>
  <text x="680" y="392" font-size="10" text-anchor="middle" fill="#2b6cb0">192.21M</text>

  <!-- ===== LEVEL 3 — SCALE (the axis origin is itself displaced) ===== -->
  <!-- displaced-zero mark just left of nominal 0 -->
  <line x1="493" y1="292" x2="493" y2="308" stroke="#8a5a00" stroke-width="1.5"/>
  <path d="M493,308 L500,308" stroke="#8a5a00" stroke-width="1.5"/>
  <text x="470" y="592" font-size="13" font-weight="bold" fill="#8a5a00">LEVEL 3 · SCALE — unresolved</text>
  <text x="470" y="612" font-size="11.5" fill="#333">The axis origin is itself offset. Quasars (true &#966; &#8776; 0):</text>
  <text x="470" y="628" font-size="11.5" fill="#333">median &#8722;17 &#956;as, weighted mean &#8722;21 &#956;as (Lindegren 2021).</text>
  <text x="470" y="644" font-size="11.5" fill="#333">Correction &#8220;to be used at the researcher's discretion.&#8221;</text>
  <!-- pointer from level-3 text up to the displaced zero -->
  <path d="M497,300 C 470,340 460,470 468,568" fill="none" stroke="#8a5a00" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- caption / sources -->
  <line x1="40" y1="656" x2="40" y2="656" stroke="none"/>
</svg>
