# Landet die Forschungs-Branches automatisch auf main — damit niemand manuell mergen muss.
# Deckt BEIDE Branch-Formen ab, die eine Session erzeugen kann:
#   • ulysses/*  — der nächtliche GitHub-Actions-Lauf (kein PR; landet immer)
#   • claude/*   — eine manuell gestartete Routine / Cloud-Session (öffnet einen PR;
#                  landet nur solange der PR OFFEN und kein Draft ist — ein geschlossener
#                  PR wird nie wiederbelebt)
# Trigger (repariert 2026-07-16 nach gestrandeten Sessions in den Schwester-Repos):
# Push auf so einen Branch, die PR-Ereignisse selbst (eine Cloud-Session pusht claude/*
# ZUERST und öffnet den PR danach — der Push-Lauf sah dann "kein offener PR" und
# übersprang, und das PR-Öffnen löste nichts aus), plus das nächtliche Sicherheitsnetz.
# EHRLICHKEITS-REGEL: Ein landefähiger Branch, dessen Merge oder Push scheitert, macht
# den Job ROT. Grün heißt "alles Landefähige ist gelandet" — nie "Fehler wurden weggeloggt".
name: Auto-land research

on:
  push:
    branches: ['ulysses/**', 'claude/**']
  pull_request:
    types: [opened, reopened, ready_for_review]
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC = 04:00 Berlin, ~1h nach der Forschungs-Routine
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: read   # um zu prüfen, ob ein claude/*-Branch noch einen offenen PR hat

concurrency:
  group: auto-land
  cancel-in-progress: false

jobs:
  land:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Merge ulysses/* and claude/* branches into main
        id: land
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "Atelier"
          git config user.email "ulysses@irrtum-als-methode.invalid"
          git fetch origin '+refs/heads/ulysses/*:refs/remotes/origin/ulysses/*' \
                           '+refs/heads/claude/*:refs/remotes/origin/claude/*' || true
          landed=0
          failed=0
          summary=""
          # maschinenlesbares Ergebnis pro Branch, je eine Zeile:
          #   outcome <branch> <landed|skipped_no_pr|skipped_draft_pr|conflict|push_failed>
          note() {
            echo "outcome $1 $2"
            summary="${summary}| \`$1\` | $2 |"$'\n'
          }
          for b in $(git branch -r | sed 's/^[* ] *//' | grep -E '^origin/(ulysses|claude)/' || true); do
            name="${b#origin/}"
            echo "::group::landing $name"
            # Eine manuell gestartete Routine landet auf einem claude/*-Branch und öffnet
            # einen PR. Gelandet wird nur, solange der PR OFFEN und kein Draft ist — ein
            # geschlossener PR heißt: ein Mensch hat die Session abgelehnt (z. B. überholte
            # Arbeit), sie darf nie auf main wiederauferstehen. Die nächtlichen ulysses/*-
            # Branches tragen keinen PR und landen immer.
            case "$name" in
              claude/*)
                pr_state=$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$name" --state open \
                  --json isDraft --jq 'if length == 0 then "none" elif .[0].isDraft then "draft" else "open" end' 2>/dev/null || echo none)
                if [ "$pr_state" = "none" ]; then
                  note "$name" skipped_no_pr
                  echo "::endgroup::"; continue
                elif [ "$pr_state" = "draft" ]; then
                  note "$name" skipped_draft_pr
                  echo "::endgroup::"; continue
                fi ;;
            esac
            if git merge --no-edit "$b"; then
              if git push origin main && git push origin --delete "$name"; then
                landed=$((landed+1)); note "$name" landed
              else
                failed=$((failed+1)); note "$name" push_failed
                git reset --hard origin/main   # spätere Merges nicht auf ungepushtem Stand aufbauen
              fi
            else
              failed=$((failed+1)); note "$name" conflict
              git merge --abort || true
            fi
            echo "::endgroup::"
          done
          printf '## Auto-land\n\n| branch | outcome |\n|---|---|\n%s\n**%s landed, %s failed**\n' \
            "$summary" "$landed" "$failed" >> "$GITHUB_STEP_SUMMARY"
          echo "landed=$landed" >> "$GITHUB_OUTPUT"
          if [ "$failed" -gt 0 ]; then
            echo "::error::$failed landefähige(r) Branch(es) nicht gelandet — siehe outcome-Zeilen oben"
            exit 1
          fi

      # Promptheit: sobald etwas auf main gelandet ist, die Website-Integration sofort
      # anstoßen (statt bis zum 03:00-Cron zu warten). Cross-repo → repository_dispatch.
      # Braucht das Secret SITE_DISPATCH_TOKEN (Token mit contents:write auf
      # frankbueltge/frankbueltge.de); der eingebaute GITHUB_TOKEN reicht nicht über
      # Repo-Grenzen. Fehlt das Secret, wird der Schritt sauber übersprungen.
      # Läuft auch, wenn der Land-Schritt rot wurde: Gelandetes soll trotzdem prompt integrieren.
      - name: Trigger site integrate
        if: ${{ !cancelled() && steps.land.outputs.landed != '0' }}
        env:
          SITE_DISPATCH_TOKEN: ${{ secrets.SITE_DISPATCH_TOKEN }}
        run: |
          if [ -z "$SITE_DISPATCH_TOKEN" ]; then
            echo "::warning::SITE_DISPATCH_TOKEN fehlt — überspringe Dispatch (Integrate läuft dann erst per 03:00-Cron)"
            exit 0
          fi
          code=$(curl -sS -o /dev/null -w '%{http_code}' -X POST \
            -H "Authorization: Bearer $SITE_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/frankbueltge/frankbueltge.de/dispatches \
            -d '{"event_type":"irrtum-landed"}')
          if [ "$code" = "204" ]; then
            echo "dispatch ok (HTTP 204) — atelier-integrate angestoßen"
          else
            echo "::warning::dispatch fehlgeschlagen (HTTP $code) — Integrate läuft per 03:00-Cron"
          fi
